name: Build Windows

on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkUpDesktop-windows
          path: C:\Users\stf\Desktop\linkUp\LibreLinkUpDesktop
