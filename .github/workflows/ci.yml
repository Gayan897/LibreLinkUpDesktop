name: Cross-Platform Build

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Clear cache (Linux/Mac)
        if: runner.os != 'Windows'
        run: rm -rf ${{ runner.temp }}/* ${{ runner.tool_cache }}/*

      - name: Clear cache (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item -Recurse -Force "${{ runner.temp }}/*"
          Remove-Item -Recurse -Force "${{ runner.tool_cache }}/*"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          timeout-minutes: 10

      - name: Cache Node.js modules
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'
          timeout-minutes: 10

      - name: Retry Node.js setup
        shell: bash
        run: |
          for i in {1..5}; do
            npm install --legacy-peer-deps && break || sleep 15
          done

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ./dist
